<section class="feature-page">
  <header class="page-header hero-panel">
    <div>
      <p class="eyebrow">{{ pageEyebrow }}</p>
      <h1>{{ pageTitle }}</h1>
      <p class="page-subtitle">{{ pageSubtitle }}</p>
    </div>
  </header>

  <p-card class="feature-card">
    <div class="section-heading">
      <div>
        <h2>{{ tableTitle }}</h2></div>
    </div>

    <app-shared-table
      [showFilterButton]="showFilterButton"
      (filterButtonClick)="openFilterSidebar()"
      [caption]="tableCaption"
      [columns]="tableColumns"
      [value]="tableRows"
      [showAddNewButton]="showAddNewButton"
      [toolbarButtonLabel]="addNewButtonLabel"
      [showRowActions]="showRowActions"
      [rowActionHeader]="rowActionHeader"
      (toolbarButtonClick)="openAddDialog()"
    >
      <ng-template #rowActions let-row>
        <p-menu
          #rowMenu
          [model]="rowActionItems"
          [popup]="true"
          appendTo="body"
          styleClass="row-action-menu"
        ></p-menu>

        <button
          pButton
          type="button"
          icon="pi pi-ellipsis-v"
          [text]="true"
          [rounded]="true"
          class="row-action-trigger"
          (click)="openRowActions(rowMenu, $event, row)"
        ></button>
      </ng-template>
      <ng-template appTableCellTemplate="Status" let-row>
        <span class="status-badge" [class.status-active]="row.Status === 'Active'"
          [class.status-inactive]="row.Status === 'Inactive'">
          {{ row.Status }}
        </span>
      </ng-template>
    </app-shared-table>
  </p-card>
</section>

<p-dialog
  [(visible)]="showFilterSidebar"
  [modal]="true"
  position="right"
  [draggable]="false"
  [resizable]="false"
  [closable]="true"
  [dismissableMask]="true"
  styleClass="filter-drawer-dialog"
  [style]="{ width: '32rem', maxWidth: '96vw', height: '100vh' }"
  (onHide)="closeFilterSidebar()"
>
  <p-card class="feature-card filter-drawer-card">
    <section class="filter-panel filter-panel-compact">
      <div class="filter-panel-header">
        <div>
          <h2>{{ filterTitle }}</h2>
          <p class="section-copy">{{ filterDescription }}</p>
        </div>
      </div>

      <section class="field-grid">
        <app-text-field
          label="Branch Name"
          inputId="branchName"
          placeholder="Enter branch name"
          [model]="filterBranchName"
          (modelChange)="filterBranchName = $event"
        ></app-text-field>
      </section>

      <app-action-buttons
        [primaryLabel]="primaryActionLabel"
        [secondaryLabel]="secondaryActionLabel"
        [showSecondary]="showSecondaryAction"
        (primaryClick)="searchBranches()"
        (secondaryClick)="resetForm()"
      ></app-action-buttons>
    </section>
  </p-card>
</p-dialog>

<p-dialog
  [(visible)]="showAddDialog"
  [modal]="true"
  [style]="{ width: '52rem', maxWidth: '96vw' }"
  [draggable]="false"
  [resizable]="false"
  [closable]="true"
  (onHide)="closeAddDialog()"
>
  <ng-template pTemplate="header">
    <div class="dialog-copy">
      <p class="eyebrow">Branch Master</p>
      <h3>{{ dialogTitle }}</h3>
      <p>{{ dialogSubtitle }}</p>
    </div>
  </ng-template>

  <section class="field-grid dialog-grid">
    <app-text-field
      label="Code"
      inputId="dialog-code"
      placeholder="Enter branch code"
      [model]="dialogModel.Code ?? ''"
      (modelChange)="dialogModel.Code = $event"
    ></app-text-field>

    <app-text-field
      label="Branch Name"
      inputId="dialog-name"
      placeholder="Enter branch name"
      [model]="dialogModel.Name ?? ''"
      (modelChange)="dialogModel.Name = $event"
    ></app-text-field>

    <app-text-field
      label="Phone"
      inputId="dialog-phone"
      placeholder="Enter phone number"
      [model]="dialogModel.Phone ?? ''"
      (modelChange)="dialogModel.Phone = $event"
    ></app-text-field>

    <app-text-field
      label="Email"
      inputId="dialog-email"
      placeholder="Enter email"
      [model]="dialogModel.Email ?? ''"
      (modelChange)="dialogModel.Email = $event"
    ></app-text-field>

    <app-text-field
      label="Contact Person"
      inputId="dialog-contactPerson"
      placeholder="Enter contact person"
      [model]="dialogModel.ContactPerson ?? ''"
      (modelChange)="dialogModel.ContactPerson = $event"
    ></app-text-field>

    <app-text-field
      label="Contact Mobile"
      inputId="dialog-contactMobileNo"
      placeholder="Enter contact mobile number"
      [model]="dialogModel.ContactMobileNo ?? ''"
      (modelChange)="dialogModel.ContactMobileNo = $event"
    ></app-text-field>

    <app-text-field
      label="Contact Email"
      inputId="dialog-contactEmail"
      placeholder="Enter contact email"
      [model]="dialogModel.ContactEmail ?? ''"
      (modelChange)="dialogModel.ContactEmail = $event"
    ></app-text-field>

    <app-text-field
      label="Address 1"
      inputId="dialog-address1"
      placeholder="Enter address line 1"
      [model]="dialogModel.Address1 ?? ''"
      (modelChange)="dialogModel.Address1 = $event"
    ></app-text-field>

    <app-text-field
      label="Address 2"
      inputId="dialog-address2"
      placeholder="Enter address line 2"
      [model]="dialogModel.Address2 ?? ''"
      (modelChange)="dialogModel.Address2 = $event"
    ></app-text-field>

    <app-text-field
      label="Postal Code"
      inputId="dialog-postalCode"
      placeholder="Enter postal code"
      [model]="dialogModel.PostalCode?.toString() ?? ''"
      (modelChange)="dialogModel.PostalCode = $event ? +$event : undefined"
    ></app-text-field>

    <app-text-field
      label="Remarks"
      inputId="dialog-remarks"
      placeholder="Enter remarks"
      [model]="dialogModel.Remarks ?? ''"
      (modelChange)="dialogModel.Remarks = $event"
    ></app-text-field>
  </section>

  <div class="dialog-actions">
    <app-action-buttons
      [primaryLabel]="dialogPrimaryActionLabel"
      secondaryLabel="Cancel"
      primaryIcon="pi pi-save"
      secondaryIcon="pi pi-times"
      [secondaryText]="true"
      [secondaryOutlined]="false"
      (primaryClick)="submitAddDialog()"
      (secondaryClick)="closeAddDialog()"
    ></app-action-buttons>
  </div>
</p-dialog>
