<section class="feature-page">
  <p-confirmDialog />

  <header class="page-header hero-panel">
    <div>
      <p class="eyebrow">{{ pageEyebrow }}</p>
      <h1>{{ pageTitle }}</h1>
      <p class="page-subtitle">{{ pageSubtitle }}</p>
    </div>
  </header>

  <p-card class="feature-card">
    @if (pageLoading) {
      <div class="page-spinner-state">
        <p-progressSpinner ariaLabel="Loading"></p-progressSpinner>
        <div class="page-spinner-copy">
          <small class="page-spinner-kicker">Please wait</small>
          <strong>{{ pageLoadingTitle }}</strong>
          <span>{{ pageLoadingSubtitle }}</span>
        </div>
      </div>
    }

    @if (!pageLoading) {
    <div class="section-heading">
      <div>
        <h2>{{ tableTitle }}</h2>
      </div>
    </div>

    <app-shared-table [showFilterButton]="showFilterButton" [showDownloadButton]="showDownloadButton"
      (excelDownloadClick)="exportDiningTablesAsExcel()" (pdfDownloadClick)="exportDiningTablesAsPdf()"
      [downloadLoading]="downloadLoading" [downloadLoadingLabel]="downloadLoadingLabel"
      [caption]="tableCaption" [columns]="tableColumns"
      [value]="tableRows" [showAddNewButton]="showAddNewButton" [toolbarButtonLabel]="addNewButtonLabel"
      [showRowActions]="showRowActions" [rowActionHeader]="rowActionHeader" [paginator]="false"
      (toolbarButtonClick)="openAddDialog()">
      <ng-template appTableCellTemplate="Status" let-row>
        <span class="status-badge" [class.status-active]="row.Status === 'Active'"
          [class.status-inactive]="row.Status === 'Inactive'">
          {{ row.Status }}
        </span>
      </ng-template>

      <ng-template #rowActions let-row>
        <p-menu #rowMenu [model]="rowActionItems" [popup]="true" appendTo="body" styleClass="row-action-menu"></p-menu>

        <button pButton type="button" icon="pi pi-ellipsis-v" [text]="true" [rounded]="true" class="row-action-trigger"
          (click)="openRowActions(rowMenu, $event, row)"></button>
      </ng-template>
    </app-shared-table>
    }
  </p-card>
</section>

<p-dialog appendTo="body" [(visible)]="showAddDialog" [modal]="true" [style]="{ width: '56rem', maxWidth: '96vw' }" [draggable]="false"
  [resizable]="false" [closable]="true" (onHide)="closeAddDialog()">
  <ng-template pTemplate="header">
    <div class="dialog-copy">
      <h3>{{ dialogTitle }}</h3>
      <p>{{ dialogSubtitle }}</p>
    </div>
  </ng-template>

  <section class="field-grid dialog-grid">
    @if (userDetails.RoleId === 1) {
      <app-select-field label="Organization" inputId="dialog-organization" placeholder="Choose organization"
        [options]="organizationOptions" [required]="true" [showRequiredMark]="true" [submitted]="dialogSubmitted"
        errorMessage="Organization is required." [numberValue]="true" [model]="dialogOrganization"
        (modelChange)="onDialogOrganizationChange($event)" />
    }

    <app-text-field label="Code" inputId="dialog-code" [showRequiredMark]="true" placeholder="Enter table code"
      [required]="true" [submitted]="dialogSubmitted" errorMessage="Code is required." [disabled]="true"
      [maxlength]="100" [model]="dialogCode" (modelChange)="dialogCode = $event" />

    <app-text-field label="Table Name" inputId="dialog-name" [showRequiredMark]="true" placeholder="Enter table name"
      [required]="true" [submitted]="dialogSubmitted" errorMessage="Name is required." [maxlength]="200"
      [model]="dialogName" (modelChange)="dialogName = $event" />

    <app-select-field label="Branch" inputId="dialog-branch" placeholder="Choose branch" [options]="branchOptions"
      [required]="true" [showRequiredMark]="true" [submitted]="dialogSubmitted" errorMessage="Branch is required."
      [numberValue]="true" [disabled]="userDetails.RoleId !== 1 && userDetails.IsAdmin !== true"
      [model]="dialogBranchId" (modelChange)="onDialogBranchChange($event)" />

    <app-select-field label="Floor" inputId="dialog-floor" placeholder="Choose floor" [options]="floorOptions"
      [required]="true" [showRequiredMark]="true" [submitted]="dialogSubmitted" errorMessage="Floor is required."
      [numberValue]="true" [model]="dialogFloorId" (modelChange)="dialogFloorId = $event" />

    <app-text-field label="Seating Size" inputId="dialog-seating-size" type="number" [showRequiredMark]="true"
      placeholder="Enter seating size" [required]="true" [submitted]="dialogSubmitted"
      errorMessage="Seating size is required." [model]="dialogSeatingSize" (modelChange)="dialogSeatingSize = $event" />

    <app-text-field label="Display Order" inputId="dialog-display-order" type="number" [showRequiredMark]="true"
      placeholder="Enter table display order" [required]="true" [submitted]="dialogSubmitted"
      errorMessage="Display order is required." [model]="dialogDisplayOrder"
      (modelChange)="dialogDisplayOrder = $event" />

    <app-text-field label="Remarks" inputId="dialog-remarks" placeholder="Enter table remarks" [model]="dialogRemarks"
      (modelChange)="dialogRemarks = $event" />

    <app-image-upload-field label="Table Image" inputId="dialog-image" [model]="dialogImageFile"
      [previewUrl]="dialogImagePreviewUrl" (modelChange)="dialogImageFile = $event"
      (previewUrlChange)="dialogImagePreviewUrl = $event" />
  </section>

  <div class="dialog-actions">
    <app-action-buttons [primaryLabel]="dialogPrimaryActionLabel" secondaryLabel="Clear" primaryIcon="pi pi-save"
      secondaryIcon="pi pi-refresh" [secondaryText]="true" [secondaryOutlined]="false"
      (primaryClick)="submitAddDialog()" (secondaryClick)="resetDialogForm()" />
  </div>
</p-dialog>
