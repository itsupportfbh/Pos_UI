<section class="feature-page">
  <p-confirmDialog />

  <header class="page-header hero-panel">
    <div>
      <p class="eyebrow">{{ pageEyebrow }}</p>
      <h1>{{ pageTitle }}</h1>
      <p class="page-subtitle">{{ pageSubtitle }}</p>
    </div>
  </header>

  <p-card class="feature-card">
    <div class="section-heading">
      <div>
        <h2>{{ tableTitle }}</h2>
      </div>
    </div>

    <app-shared-table [showFilterButton]="showFilterButton" (filterButtonClick)="openFilterSidebar()"
      [caption]="tableCaption" [columns]="tableColumns" [value]="tableRows" [showAddNewButton]="showAddNewButton"
      [toolbarButtonLabel]="addNewButtonLabel" [showRowActions]="showRowActions" [rowActionHeader]="rowActionHeader"
      (toolbarButtonClick)="openAddDialog()">
      <ng-template #rowActions let-row>
        <p-menu #rowMenu [model]="rowActionItems" [popup]="true" appendTo="body" styleClass="row-action-menu" />
        <button pButton type="button" icon="pi pi-ellipsis-v" text="true" rounded="true" class="row-action-trigger"
          (click)="openRowActions(rowMenu, $event, row)"></button>
      </ng-template>

      <ng-template appTableCellTemplate="Status" let-row>
        <span class="status-badge" [class.status-active]="row.Status === 'Active'"
          [class.status-inactive]="row.Status === 'Inactive'">
          {{ row.Status }}
        </span>
      </ng-template>
    </app-shared-table>
  </p-card>
</section>

<p-dialog [(visible)]="showFilterSidebar" [modal]="true" position="right" [draggable]="false" [resizable]="false"
  [closable]="true" [dismissableMask]="true" styleClass="filter-drawer-dialog"
  [style]="{ width: '32rem', maxWidth: '96vw', height: '100vh' }" (onHide)="closeFilterSidebar()">
  <p-card class="feature-card filter-drawer-card">
    <section class="filter-panel filter-panel-compact">
      <div class="filter-panel-header">
        <div>
          <h2>{{ filterTitle }}</h2>
        </div>
      </div>


      <section class="field-grid">

        <app-text-field
            label="Printer Name"
            inputId="PrinterName"
            placeholder="Kitchen Printer"
            [model]="filterPrinterName"
            (modelChange)="filterPrinterName = $event"
          />
        <app-select-field label="Branch" inputId="branch" placeholder="Choose branch" [options]="branchOptions"
          [numberValue]="true" [model]="filterBranch" (modelChange)="onFilterBranchChange($event)" />

        <app-select-field label="Counter" inputId="counter" placeholder="Choose counter" [options]="filterCounterOptions"
          [numberValue]="true" [model]="filterCounter" (modelChange)="onFilterCounterChange($event)" />

        <app-select-field label="Terminal" inputId="terminal" placeholder="Choose terminal" [options]="filterTerminalOptions"
          [numberValue]="true" [model]="filterTerminal" (modelChange)="filterTerminal = $event" />
      </section>

      <app-action-buttons [primaryLabel]="primaryActionLabel" [secondaryLabel]="secondaryActionLabel"
        [showSecondary]="showSecondaryAction" (primaryClick)="searchPrinters()" (secondaryClick)="resetForm()" />
    </section>
  </p-card>
</p-dialog>

@if (showAddNewButton) {
<p-dialog [(visible)]="showAddDialog" [modal]="true" [style]="{ width: '52rem', maxWidth: '96vw' }" [draggable]="false"
  [resizable]="false" [closable]="true" (onHide)="closeAddDialog()">
  <ng-template pTemplate="header">
    <div class="dialog-copy">
      <p class="eyebrow">Create Master</p>
      <h3>{{ dialogTitle }}</h3>
      <p>{{ dialogSubtitle }}</p>
    </div>
  </ng-template>

  <section class="field-grid dialog-grid">
    <app-text-field label="Printer Code" inputId="dialog-printerCode" placeholder="PRN001" [required]="true"
      [showRequiredMark]="true" [submitted]="dialogSubmitted" errorMessage="Printer Code is required."
      [textWithNumbersOnly]="true" formatErrorMessage="Printer Code allows text and numbers only."
      [model]="dialogPrinterCode" (modelChange)="dialogPrinterCode = $event" />

    <app-text-field label="Printer Name" inputId="dialog-printerName" placeholder="Kitchen Printer" [required]="true"
      [showRequiredMark]="true" [submitted]="dialogSubmitted" errorMessage="Printer Name is required."
      [textWithNumbersOnly]="true" formatErrorMessage="Printer Name allows text and numbers only."
      [model]="dialogPrinterName" (modelChange)="dialogPrinterName = $event" />

    <app-select-field label="Branch" inputId="dialog-branch" placeholder="Choose branch" [options]="branchOptions"
      [required]="true" [showRequiredMark]="true" [submitted]="dialogSubmitted" errorMessage="Branch is required."
      [numberValue]="true" [model]="dialogBranch" (modelChange)="onDialogBranchChange($event)" />

    <app-select-field label="Counter" inputId="dialog-counter" placeholder="Choose counter" [options]="dialogCounterOptions"
      [required]="true" [showRequiredMark]="true" [submitted]="dialogSubmitted" errorMessage="Counter is required."
      [numberValue]="true" [model]="dialogCounter" (modelChange)="onDialogCounterChange($event)" />

    <app-select-field label="Terminal" inputId="dialog-terminal" placeholder="Choose terminal" [options]="dialogTerminalOptions"
      [required]="true" [showRequiredMark]="true" [submitted]="dialogSubmitted" errorMessage="Terminal is required."
      [numberValue]="true" [model]="dialogTerminal" (modelChange)="dialogTerminal = $event" />

    <app-text-field label="Remarks" inputId="dialog-remarks" placeholder="Remarks" [model]="dialogRemarks"
      (modelChange)="dialogRemarks = $event" />
  </section>

  <div class="dialog-actions">
    <app-action-buttons [primaryLabel]="dialogPrimaryActionLabel" secondaryLabel="Clear" primaryIcon="pi pi-save"
      secondaryIcon="pi pi-refresh" [primaryLoading]="dialogSaving" [primaryDisabled]="dialogSaving"
      [secondaryDisabled]="dialogSaving" [secondaryText]="true" [secondaryOutlined]="false"
      (primaryClick)="submitAddDialog()" (secondaryClick)="resetDialogForm()" />
  </div>
</p-dialog>
}
