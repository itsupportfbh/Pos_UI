<section class="feature-page">
  <header class="page-header hero-panel">
    <div>
      <p class="eyebrow">{{ pageEyebrow }}</p>
      <h1>{{ pageTitle }}</h1>
      <p class="page-subtitle">{{ pageSubtitle }}</p>
    </div>
  </header>

  <p-card class="feature-card">
    <div class="section-heading">
      <div>
        <h2>{{ tableTitle }}</h2></div>
    </div>

    <app-shared-table [showFilterButton]="showFilterButton" (filterButtonClick)="openFilterSidebar()" [caption]="tableCaption" [columns]="tableColumns" [value]="tableRows" [showAddNewButton]="showAddNewButton" [toolbarButtonLabel]="addNewButtonLabel" [showRowActions]="showRowActions" [rowActionHeader]="rowActionHeader" (toolbarButtonClick)="openAddDialog()">
      <ng-template #rowActions let-row>
        <p-menu #rowMenu [model]="rowActionItems" [popup]="true" appendTo="body" styleClass="row-action-menu" />
        <button pButton type="button" icon="pi pi-ellipsis-v" text="true" rounded="true" class="row-action-trigger" (click)="openRowActions(rowMenu, $event, row)"></button>
      </ng-template>
    </app-shared-table>
  </p-card>
</section>

<p-dialog [(visible)]="showFilterSidebar" [modal]="true" position="right" [draggable]="false" [resizable]="false" [closable]="true" [dismissableMask]="true" styleClass="filter-drawer-dialog" [style]="{ width: '32rem', maxWidth: '96vw', height: '100vh' }" (onHide)="closeFilterSidebar()">
  <p-card class="feature-card filter-drawer-card">
      <section class="filter-panel filter-panel-compact">
        <div class="filter-panel-header">
          <div>
            <h2>{{ filterTitle }}</h2>
          </div>
        </div>

        <section class="field-grid">
          <app-text-field
            label="Category Name"
            inputId="categoryName"
            placeholder="Enter category name"
            [model]="filterCategoryName"
            (modelChange)="filterCategoryName = $event"
          />
        </section>

        <app-action-buttons [primaryLabel]="primaryActionLabel" [secondaryLabel]="secondaryActionLabel" [showSecondary]="showSecondaryAction" (secondaryClick)="resetForm()" />
      </section>
    </p-card>
</p-dialog>
@if (showAddNewButton) {
  <p-dialog [(visible)]="showAddDialog" [modal]="true" [style]="{ width: '52rem', maxWidth: '96vw' }" [draggable]="false" [resizable]="false" [closable]="true" (onHide)="closeAddDialog()">
    <ng-template pTemplate="header">
      <div class="dialog-copy">
        <p class="eyebrow">Create Master</p>
        <h3>{{ dialogTitle }}</h3>
        <p>{{ dialogSubtitle }}</p>
      </div>
    </ng-template>

    <section class="field-grid dialog-grid">
      <app-text-field
        label="Category Code"
        inputId="dialog-categoryCode"
        placeholder="CAT-02"
        [model]="dialogCategoryCode"
        (modelChange)="dialogCategoryCode = $event"
      />

      <app-text-field
        label="Category Name"
        inputId="dialog-categoryName"
        placeholder="Bakery"
        [model]="dialogCategoryName"
        (modelChange)="dialogCategoryName = $event"
      />
    </section>

    <div class="dialog-actions">
      <app-action-buttons
        [primaryLabel]="dialogPrimaryActionLabel"
        secondaryLabel="Cancel"
        primaryIcon="pi pi-save"
        secondaryIcon="pi pi-times"
        [secondaryText]="true"
        [secondaryOutlined]="false"
        (primaryClick)="submitAddDialog()"
        (secondaryClick)="closeAddDialog()"
      />
    </div>
  </p-dialog>
}
