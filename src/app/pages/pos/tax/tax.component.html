<section class="feature-page">
  <p-confirmDialog />

  <header class="page-header hero-panel">
    <div>
      <p class="eyebrow">{{ pageEyebrow }}</p>
      <h1>{{ pageTitle }}</h1>
      <p class="page-subtitle">{{ pageSubtitle }}</p>
    </div>
  </header>

  <p-card class="feature-card">
    @if (pageLoading) {
      <div class="page-spinner-state">
        <p-progressSpinner ariaLabel="Loading"></p-progressSpinner>
        <div class="page-spinner-copy">
          <strong>{{ pageLoadingTitle }}</strong>
          <span>{{ pageLoadingSubtitle }}</span>
        </div>
      </div>
    }

    @if (!pageLoading) {
    <div class="section-heading">
      <div>
        <h2>{{ tableTitle }}</h2>
      </div>
    </div>

    <app-shared-table
      [showDownloadButton]="showDownloadButton" (excelDownloadClick)="exportTaxesAsExcel()"
      (pdfDownloadClick)="exportTaxesAsPdf()" [downloadLoading]="downloadLoading"
      [downloadLoadingLabel]="downloadLoadingLabel"
      [caption]="tableCaption" [columns]="tableColumns" [value]="tableRows" [showAddNewButton]="showAddNewButton"
      [toolbarButtonLabel]="addNewButtonLabel" [showRowActions]="showRowActions" [rowActionHeader]="rowActionHeader"
      (toolbarButtonClick)="openAddDialog()">
      <ng-template #rowActions let-row>
        <p-menu #rowMenu [model]="rowActionItems" [popup]="true" appendTo="body" styleClass="row-action-menu"></p-menu>

        <button pButton type="button" icon="pi pi-ellipsis-v" [text]="true" [rounded]="true" class="row-action-trigger"
          (click)="openRowActions(rowMenu, $event, row)"></button>
      </ng-template>
      <ng-template appTableCellTemplate="Status" let-row>
        <span class="status-badge" [class.status-active]="row.Status === 'Active'"
          [class.status-inactive]="row.Status === 'Inactive'">
          {{ row.Status }}
        </span>
      </ng-template>
    </app-shared-table>
    }
  </p-card>
</section>
@if (showAddNewButton) {
<p-dialog [(visible)]="showAddDialog" [modal]="true" [style]="{ width: '52rem', maxWidth: '96vw' }" [draggable]="false"
  [resizable]="false" [closable]="true" (onHide)="closeAddDialog()">
  <ng-template pTemplate="header">
    <div class="dialog-copy">
      <h3>{{ dialogTitle }}</h3>
      <p>{{ dialogSubtitle }}</p>
    </div>
  </ng-template>

  <section class="field-grid dialog-grid">
      @if (userDetails.RoleId === 1) {
        <app-select-field label="Organization" inputId="dialog-organization" placeholder="Choose organization"
          [options]="organizationOptions" [required]="true" [showRequiredMark]="true" [submitted]="dialogSubmitted"
          errorMessage="Organization is required." [numberValue]="true" [model]="dialogOrganization"
          (modelChange)="onOrganizationChange($event)" />
      }

    <app-text-field label="Tax Code" inputId="dialog-taxCode" [showRequiredMark]="true" placeholder="Enter tax code"
      [required]="true" [submitted]="dialogSubmitted" errorMessage="Code is required." [disabled]="true"
      [maxlength]="100" [model]="dialogTaxCode" (modelChange)="dialogTaxCode = $event" />

    <app-text-field label="Tax Name" inputId="dialog-taxName" [showRequiredMark]="true" placeholder="Enter tax name"
      [required]="true" [maxlength]="200" [submitted]="dialogSubmitted" errorMessage="Name is required."
      [model]="dialogTaxName" (modelChange)="dialogTaxName = $event" />

    <app-text-field label="Tax Percentage" inputId="dialog-taxRate" [showRequiredMark]="true" placeholder="Enter tax percentage" type="number" [required]="true"
      [submitted]="dialogSubmitted" [percentageOnly]="true" [showFormatErrorWhileTyping]="true"
      formatErrorMessage="Tax Percentage should be between 0 and 100." errorMessage="{{ rateErrorMessage }}"
      [model]="dialogPercentage" (modelChange)="onRateChange($event)" />

  </section>



  <div class="dialog-actions">
    <app-action-buttons [primaryLabel]="dialogPrimaryActionLabel" secondaryLabel="Clear" primaryIcon="pi pi-save"
      secondaryIcon="pi pi-refresh" [secondaryText]="true" [secondaryOutlined]="false"
      (primaryClick)="submitAddDialog()" (secondaryClick)="resetDialogForm(true)" />
  </div>
</p-dialog>
}
