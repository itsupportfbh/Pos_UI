<section class="feature-page">
  <p-confirmDialog />
  <header class="page-header hero-panel">
    <div>
      <p class="eyebrow">{{ pageEyebrow }}</p>
      <h1>{{ pageTitle }}</h1>
      <p class="page-subtitle">{{ pageSubtitle }}</p>
    </div>
  </header>

  <p-card class="feature-card">
    <div class="section-heading">
      <div>
        <h2>{{ tableTitle }}</h2>
      </div>
    </div>

    <app-shared-table [showFilterButton]="showFilterButton" (filterButtonClick)="openFilterSidebar()"
      [showDownloadButton]="showDownloadButton" (excelDownloadClick)="exportTerminalsAsExcel()"
      (pdfDownloadClick)="exportTerminalsAsPdf()" [downloadLoading]="downloadLoading"
      [downloadLoadingLabel]="downloadLoadingLabel"
      [caption]="tableCaption" [columns]="tableColumns" [value]="tableRows" [showAddNewButton]="showAddNewButton"
      [toolbarButtonLabel]="addNewButtonLabel" [showRowActions]="showRowActions" [rowActionHeader]="rowActionHeader"
      (toolbarButtonClick)="openAddDialog()">
      <ng-template #rowActions let-row>
        <p-menu #rowMenu [model]="rowActionItems" [popup]="true" appendTo="body" styleClass="row-action-menu"></p-menu>

        <button pButton type="button" icon="pi pi-ellipsis-v" [text]="true" [rounded]="true" class="row-action-trigger"
          (click)="openRowActions(rowMenu, $event, row)"></button>
      </ng-template>
      <ng-template appTableCellTemplate="Status" let-row>
        <span class="status-badge" [class.status-active]="row.Status === 'Active'"
          [class.status-inactive]="row.Status === 'Inactive'">
          {{ row.Status }}
        </span>
      </ng-template>
    </app-shared-table>
  </p-card>
</section>

<p-dialog [(visible)]="showFilterSidebar" [modal]="true" position="right" [draggable]="false" [resizable]="false"
  [closable]="true" [dismissableMask]="true" styleClass="filter-drawer-dialog"
  [style]="{ width: '32rem', maxWidth: '96vw', height: '100vh' }" (onHide)="closeFilterSidebar()">
  <p-card class="feature-card filter-drawer-card">
    <section class="filter-panel filter-panel-compact">
      <div class="filter-panel-header">
        <div>
          <h2>{{ filterTitle }}</h2>
        </div>
      </div>

      <app-multiselect-field label="Branch" inputId="counter-branch-filter" placeholder="Select branches"
        [options]="branchOptions" [disabled]="isBranchSelectionLocked" [model]="selectedBranchIds"
        (modelChange)="onfilterBranchChange($event)" />

      <app-multiselect-field label="Counter" inputId="counter-filter" placeholder="Select counters"
        [options]="counterfilterOptions" [model]="selectedCounterIds" (modelChange)="onfilterCounterChange($event)" />

      <app-action-buttons [primaryLabel]="primaryActionLabel" [secondaryLabel]="secondaryActionLabel"
        [showSecondary]="showSecondaryAction" (primaryClick)="searchTerminals()" (secondaryClick)="resetForm()" />
    </section>
  </p-card>
</p-dialog>
@if (showAddNewButton) {
<p-dialog [(visible)]="showAddDialog" [modal]="true" [style]="{ width: '52rem', maxWidth: '96vw' }" [draggable]="false"
  [resizable]="false" [closable]="true" (onHide)="closeAddDialog()">
  <ng-template pTemplate="header">
    <div class="dialog-copy">
      <h3>{{ dialogTitle }}</h3>
      <p>{{ dialogSubtitle }}</p>
    </div>
  </ng-template>

  <section class="field-grid dialog-grid">
    <app-text-field label="Code" [showRequiredMark]="true" inputId="dialog-terminalCode" placeholder="Enter terminal code"
      [required]="true" [maxlength]="100" [submitted]="dialogSubmitted" errorMessage="Code is required." [disabled]="true"
      [model]="dialogModel.code ?? ''" (modelChange)="dialogModel.code = $event" />

    <app-text-field label="Name" [showRequiredMark]="true" inputId="dialog-terminalName" placeholder="Enter terminal name"
      [required]="true" [maxlength]="200" [submitted]="dialogSubmitted" errorMessage="Name is required."
      [model]="dialogModel.name ?? ''" (modelChange)="dialogModel.name = $event" />

    <app-select-field label="Branch" [showRequiredMark]="true" inputId="dialog-branch" placeholder="Choose branch"
      [options]="branchOptions" [required]="true" [submitted]="dialogSubmitted" errorMessage="Branch is required."
      [disabled]="isBranchSelectionLocked" [numberValue]="true" [model]="dialogModel.branchId ?? 0"
      (modelChange)="onBranchChange($event)" />

    <app-select-field label="Counter" [showRequiredMark]="true" inputId="dialog-counter" placeholder="Choose counter"
      [options]="counterOptions" [required]="true" [submitted]="dialogSubmitted" errorMessage="Counter is required."
      [numberValue]="true" 
      [model]="dialogModel.counterId ?? 0" (modelChange)="dialogModel.counterId = $event" />

    <app-text-field label="Device Name" [showRequiredMark]="true" inputId="dialog-deviceName" placeholder="Enter device name"
      [required]="true" [maxlength]="100" [submitted]="dialogSubmitted" errorMessage="Device name is required."
      [model]="dialogModel.deviceName ?? ''" (modelChange)="dialogModel.deviceName = $event" />

  </section>



  <div class="dialog-actions">
    <app-action-buttons [primaryLabel]="dialogPrimaryActionLabel" secondaryLabel="Clear" primaryIcon="pi pi-save"
      secondaryIcon="pi pi-refresh" [secondaryText]="true" [secondaryOutlined]="false"
      (primaryClick)="submitAddDialog()" (secondaryClick)="resetDialogForm(true)" />
  </div>
</p-dialog>
}
