  <section class="feature-page">
    <p-confirmDialog />

    <header class="page-header hero-panel">
      <div>
        <p class="eyebrow">{{ pageEyebrow }}</p>
        <h1>{{ pageTitle }}</h1>
        <p class="page-subtitle">{{ pageSubtitle }}</p>
      </div>
    </header>

    <p-card class="feature-card">
      <div class="section-heading">
        <div>
          <h2>{{ tableTitle }}</h2>
        </div>
      </div>

      <app-shared-table [showFilterButton]="showFilterButton" (filterButtonClick)="openFilterSidebar()"
        [showDownloadButton]="showDownloadButton" (excelDownloadClick)="exportEmployeesAsExcel()"
        (pdfDownloadClick)="exportEmployeesAsPdf()" [downloadLoading]="downloadLoading"
        [downloadLoadingLabel]="downloadLoadingLabel"
        [caption]="tableCaption" [columns]="tableColumns" [value]="tableRows" [showAddNewButton]="showAddNewButton"
        [toolbarButtonLabel]="addNewButtonLabel" [showRowActions]="showRowActions" [rowActionHeader]="rowActionHeader"
        (toolbarButtonClick)="openAddDialog()">
        <ng-template #rowActions let-row>
          <p-menu #rowMenu [model]="rowActionItems" [popup]="true" appendTo="body" styleClass="row-action-menu"></p-menu>

          <button pButton type="button" icon="pi pi-ellipsis-v" [text]="true" [rounded]="true" class="row-action-trigger"
            (click)="openRowActions(rowMenu, $event, row)"></button>
        </ng-template>

        <ng-template appTableCellTemplate="Status" let-row>
          <span class="status-badge" [class.status-active]="row.Status === 'Active'"
            [class.status-inactive]="row.Status === 'Inactive'">
            {{ row.Status }}
          </span>
        </ng-template>
      </app-shared-table>
    </p-card>
  </section>

  <p-dialog
    [(visible)]="showFilterSidebar"
    [modal]="true"
    position="right"
    [draggable]="false"
    [resizable]="false"
    [closable]="true"
    [dismissableMask]="true"
    styleClass="filter-drawer-dialog"
    [style]="{ width: '32rem', maxWidth: '96vw', height: '100vh' }"
    (onHide)="closeFilterSidebar()">

    <p-card class="feature-card filter-drawer-card">
      

      <section class="filter-panel filter-panel-compact">

        <div class="filter-panel-header">
          <div>
            <h2>{{ filterTitle }}</h2>
          </div>
        </div>

        <section class="field-grid">

      <app-multiselect-field
    label="Filter"
    inputId="employee-filter"
    placeholder="Select department and branch"
    [options]="CodeOptions"
    [model]="filterEmployee"
    [filter]="false"
    (modelChange)="filterEmployee = $event">
  </app-multiselect-field>

          

        </section>

        <app-action-buttons
          [primaryLabel]="primaryActionLabel"
          [secondaryLabel]="secondaryActionLabel"
          [showSecondary]="showSecondaryAction"
          (primaryClick)="applyFilters()"
          (secondaryClick)="resetForm()">
        </app-action-buttons>

      </section>

    </p-card>

  </p-dialog> 

  @if (showAddNewButton) {
  <p-dialog [(visible)]="showAddDialog" [modal]="true" [style]="{ width: '52rem', maxWidth: '96vw' }" [draggable]="false"
    [resizable]="false" [closable]="true" (onHide)="closeAddDialog()">
    <ng-template pTemplate="header">
      <div class="dialog-copy">
        <h3>{{ dialogTitle }}</h3>
        <p>{{ dialogSubtitle }}</p>
      </div>
    </ng-template>

    <section class="field-grid dialog-grid">

    <!-- Code -->
    <app-text-field
      label="Code"
      inputId="dialog-code"
      [showRequiredMark]="true"
      placeholder="Enter code"
      [required]="true"
      [submitted]="dialogSubmitted"
      [disabled]="true"
      errorMessage="Code is required."
      [maxlength]="100"
      [model]="dialogCode"
      (modelChange)="dialogCode = $event">
    </app-text-field>

    <!-- Name -->
    <app-text-field
     label="Name"
      inputId="dialog-name"
      [showRequiredMark]="true"
      placeholder="Enter name"
      [required]="true"
      [textOnly]="true"
      [submitted]="dialogSubmitted"
      errorMessage="Name is required."
      [maxlength]="200"
      [model]="dialogName"
      (modelChange)="dialogName = $event">
    </app-text-field>

    <!-- Department Dropdown -->
    <app-select-field
      label="Department"
      inputId="dialog-department"
      placeholder="Choose department"
      [options]="departmentOptions"
      [required]="true"
      [showRequiredMark]="true"
      [submitted]="dialogSubmitted"
      errorMessage="Department is required."
      [model]="dialogDepartment"
      (modelChange)="dialogDepartment = $event">
    </app-select-field>

    <!-- Designation Dropdown -->
    <app-select-field
      label="Designation"
      inputId="dialog-designation"
      placeholder="Choose designation"
      [options]="designationOptions"
      [required]="true"
      [showRequiredMark]="true"
      [submitted]="dialogSubmitted"
      errorMessage="Designation is required."
      [model]="dialogDesignation"
      (modelChange)="dialogDesignation = $event">
    </app-select-field>

    <!-- Branch Dropdown -->
    <app-select-field
    label="Branch"
    inputId="dialog-branch"
    placeholder="Choose branch"
    [options]="branchOptions"
    [required]="true"
    [showRequiredMark]="true"
    [submitted]="dialogSubmitted"
    errorMessage="Branch is required."
    [model]="dialogBranch"
    (modelChange)="dialogBranch = $event">
  </app-select-field>

    <!-- Phone -->
    <app-text-field
      label="Phone Number"
      inputId="dialog-phone"
      placeholder="Enter phone number"
      [submitted]="dialogSubmitted"
      [numbersOnly]="true"
      formatErrorMessage="Phone Number allows numbers only."
      [model]="dialogPhone"
      [minlength]="10"
      [maxlength]="13"
      (modelChange)="dialogPhone = $event">
    </app-text-field>

    <!-- Email -->
    <app-text-field
      label="Email"
      inputId="dialog-email"
      placeholder="Enter email"
      [submitted]="dialogSubmitted"
      [emailOnly]="true"
      formatErrorMessage="Enter a valid email."
      [model]="dialogEmail"
      (modelChange)="dialogEmail = $event">
    </app-text-field>

    <!-- Address -->
    <app-text-field
      label="Address"
      inputId="dialog-address"
      placeholder="Enter address"
      [model]="dialogAddress"
      (modelChange)="dialogAddress = $event">
    </app-text-field>

    <app-select-field
      label="Gender"
      inputId="dialog-gender"
      placeholder="Choose gender"
      [options]="genderOptions"
      [showClear]="false"
      [model]="dialogGender"
      (modelChange)="dialogGender = $event">
</app-select-field>

<app-text-field
  label="Remarks"
  inputId="dialog-remarks"
  placeholder="Enter remarks"
  [required]="true"
  [showRequiredMark]="true"
  [submitted]="dialogSubmitted"
  errorMessage="Remarks is required."
  [model]="dialogRemarks"
  (modelChange)="dialogRemarks = $event">
</app-text-field>

<app-text-field
       label="ID Number"
      inputId="dialog-id-proof"
      placeholder="Enter ID proof number"
      [submitted]="dialogSubmitted"
      [numbersOnly]="true"
      formatErrorMessage="ID Number allows numbers only."
      [model]="dialogIdProofNo"
      [minlength]="10"
      [maxlength]="13"
      (modelChange)="dialogIdProofNo = $event">
    </app-text-field>

    <!-- Status Toggle -->
    <div class="field-block">

    <!-- <label class="field-label">
      Status
    </label> -->

    <!-- <div class="status-toggle-wrapper">

      <input
        type="checkbox"
        id="dialog-status"
        [(ngModel)]="dialogStatus"
        class="status-checkbox" />

      <label for="dialog-status" class="status-label">
        {{ dialogStatus ? 'Active' : 'Inactive' }}
      </label>

    </div> -->

  </div>
  </section>

    <div class="dialog-actions">
      <app-action-buttons [primaryLabel]="dialogPrimaryActionLabel" secondaryLabel="Clear" primaryIcon="pi pi-save"
        secondaryIcon="pi pi-refresh" [secondaryText]="true" [secondaryOutlined]="false"
        (primaryClick)="submitAddDialog()" (secondaryClick)="resetDialogForm(true)"></app-action-buttons>
    </div>
  </p-dialog>
  }
