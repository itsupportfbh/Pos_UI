<div class="field-block">
  <label class="field-label" [for]="inputId">
    {{ label }}
    @if (showRequiredMark) {
      <span class="required-mark">*</span>
    }
  </label>
  <input
    pInputText
    class="field-input"
    [class.field-invalid]="showValidationError"
    [id]="inputId"
    [name]="name || inputId"
    [type]="type"
    [placeholder]="placeholder"
    [autocomplete]="autocomplete"
    [required]="required"
    [disabled]="disabled"
    [readonly]="readonly"
    [minlength]="minlength ?? null"
    [maxlength]="maxlength ?? null"
    [attr.inputmode]="inputMode || null"
    [attr.step]="step ?? null"
    [attr.min]="min ?? null"
    [attr.max]="max ?? null"
    [ngModel]="model"
    (ngModelChange)="onModelChange($event)"
  />
  @if (showRequiredError) {
    <small class="field-error">{{ requiredErrorMessage }}</small>
  } @else if (showFormatError) {
    <small class="field-error">{{ formatValidationMessage }}</small>
  } @else if (helperText) {
    <small class="field-help">{{ helperText }}</small>
  }
</div>
