<section class="shell-frame" [class.shell-frame-display]="chromeHidden">
  @if (!chromeHidden) {
    <app-header
      [appName]="appName"
      [appLogoUrl]="appLogoUrl"
      [user]="user"
      (menuToggle)="onMenuToggle()"
      (changePasswordClick)="onChangePasswordClick()"
      (logoutClick)="onLogoutClick()"
    />
  }

  <section class="workspace" [class.sidebar-visible]="sidebarOpen && !chromeHidden" [class.workspace-display]="chromeHidden">
    @if (sidebarOpen && !chromeHidden) {
      <button type="button" class="sidebar-backdrop" aria-label="Close menu" (click)="onMenuToggle()"></button>
    }

    @if (!chromeHidden) {
      <app-menu
        [appName]="appName"
        [appLogoUrl]="appLogoUrl"
        [sidebarOpen]="sidebarOpen"
        [activeMenuKey]="activeMenuKey"
        [menuItems]="menuItems"
        [currentOfficeScope]="currentOfficeScope"
        [officeOptions]="officeOptions"
        (menuSelect)="onMenuSelect($event)"
        (officeScopeChange)="onOfficeScopeChange($event)"
      />
    }

    <section class="content-panel">
      <div class="content-scroll">
        <ng-content />
      </div>
    </section>
  </section>

  @if (!chromeHidden) {
    <app-footer [appName]="appName" [appLogoUrl]="appLogoUrl" [description]="footerDescription" />
  }
</section>
