<section class="shell-frame">
  <app-header [appName]="appName" [appLogoUrl]="appLogoUrl" [user]="user" (menuToggle)="onMenuToggle()" (logoutClick)="onLogoutClick()" />

  <section class="workspace" [class.sidebar-visible]="sidebarOpen">
    @if (sidebarOpen) {
      <button type="button" class="sidebar-backdrop" aria-label="Close menu" (click)="onMenuToggle()"></button>
    }

    <app-menu
      [appName]="appName"
      [appLogoUrl]="appLogoUrl"
      [sidebarOpen]="sidebarOpen"
      [activeMenuKey]="activeMenuKey"
      [menuItems]="menuItems"
      (menuSelect)="onMenuSelect($event)"
    />

    <section class="content-panel">
      <div class="content-scroll">
        <ng-content />
      </div>
    </section>
  </section>

  <app-footer [appName]="appName" [appLogoUrl]="appLogoUrl" [description]="footerDescription" />
</section>
