@if (sidebarOpen) {
  <aside class="sidebar sidebar-open">
    <nav class="menu-list">
      <section class="menu-search">
        <i class="pi pi-search"></i>
        <input
          type="text"
          placeholder="Search menu"
          [value]="menuSearchText"
          (input)="onMenuSearchChange($any($event.target).value)"
        />
      </section>

      @for (group of filteredMenuItems; track group.key) {
        <section class="menu-group">
          <button type="button" class="menu-group-header" (click)="toggleGroup(group.key)">
            <i [class]="group.icon"></i>
            <strong>{{ group.label }}</strong>
            <span class="menu-group-arrow" [class.expanded]="isGroupExpanded(group.key)">
              <i class="pi pi-chevron-down"></i>
            </span>
          </button>

          @if (isGroupExpanded(group.key)) {
            <div class="menu-group-items" >
              @for (item of group.items; track item.key) {
                <button
                  type="button"
                  class="menu-item"
                  [class.active]="activeMenuKey === item.route"
                  (click)="onSelect(item)"
                >
                  <span>
                    <strong>{{ item.label }}</strong>
                    <small>{{ item.description }}</small>
                  </span>
                </button>
              }
            </div>
          }
        </section>
      }

      @if (!filteredMenuItems.length) {
        <section class="menu-empty-state">
          <span>No menus found.</span>
        </section>
      }
    </nav>
  </aside>
}
