<footer class="app-footer">
  <div class="footer-brand">
    @if (appLogoUrl) {
      <img class="footer-logo" [src]="appLogoUrl" [alt]="appName" />
    } @else {
      <span class="footer-icon">{{ (appName || 'A').charAt(0).toUpperCase() }}</span>
    }
    <div class="footer-brand-copy">
      <strong>{{ appName }}</strong>
      <small>Workspace shell</small>
    </div>
  </div>
  <span class="footer-description">{{ description }}</span>
</footer>
