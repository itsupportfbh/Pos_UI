<footer class="app-footer">
  <div class="footer-brand">
    @if (appLogoUrl) {
      <img class="footer-logo" [src]="appLogoUrl" [alt]="appName" />
    } @else {
      <span class="footer-icon">{{ (appName || 'A').charAt(0).toUpperCase() }}</span>
    }
    <span>{{ appName }}</span>
  </div>
  <span>{{ description }}</span>
</footer>
