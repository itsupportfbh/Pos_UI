<header class="app-header">
  <div class="header-left">
    <button
      pButton
      type="button"
      class="menu-toggle"
      icon="pi pi-bars"
      severity="secondary"
      text="true"
      (click)="onMenuToggle()"
    ></button>

    <div class="brand-mark">
      @if (appLogoUrl) {
        <img class="brand-logo" [src]="appLogoUrl" [alt]="appName" />
      } @else {
        <span class="brand-icon">{{ (appName || 'A').charAt(0).toUpperCase() }}</span>
      }
      <div>
        <strong>{{ appName }}</strong>
        <p>POS operations workspace</p>
      </div>
    </div>
  </div>

  <div class="header-user">
    <div class="connection-badge" [class.offline]="!isOnline">
      <i class="pi pi-circle-fill"></i>
      <span>{{ connectionLabel }}</span>
    </div>
    <button
      pButton
      type="button"
      class="theme-toggle"
      severity="secondary"
      [icon]="themeButtonIcon"
      [label]="themeButtonLabel"
      text="true"
      (click)="onThemeToggle()"
    ></button>
    @if (user.imageUrl) {
      <img class="header-user-image" [src]="user.imageUrl" [alt]="user.name || 'User'" />
    } @else {
      <p-avatar [label]="initials" shape="circle" size="large"></p-avatar>
    }
    <button type="button" class="header-user-profile" (click)="onProfileToggle($event)">
      <div class="header-user-details">
        <strong>{{ user.name }}</strong>
        <span>{{ user.role }}</span>
      </div>
      <i class="pi pi-chevron-down"></i>
    </button>

    @if (showProfileCard) {
      <div class="profile-card" (click)="$event.stopPropagation()">
        <div class="profile-card-header">
          @if (user.imageUrl) {
            <img class="profile-card-image" [src]="user.imageUrl" [alt]="user.name || 'User'" />
          } @else {
            <p-avatar [label]="initials" shape="circle" size="large"></p-avatar>
          }

          <div class="profile-card-copy">
            <strong>{{ user.name }}</strong>
            <span>{{ user.role }}</span>
          </div>
        </div>

        <div class="profile-card-actions">
          <button pButton type="button" severity="secondary" icon="pi pi-key" label="Change Password" text="true" (click)="onChangePasswordClick()"></button>
          <button pButton type="button" severity="danger" icon="pi pi-sign-out" label="Logout" text="true" (click)="onLogoutClick()"></button>
        </div>
      </div>
    }
  </div>
</header>
