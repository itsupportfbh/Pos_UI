<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Unity work POS</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/webp" href="./cspl-logo.webp?v=3">
  <link rel="shortcut icon" type="image/webp" href="./cspl-logo.webp?v=3">
  <script>
    (function () {
      var path = (window.location.pathname || '').replace(/\/+$/, '');
      var search = window.location.search || '';
      var lowerPath = path.toLowerCase();

      if (lowerPath.endsWith('/pos/customer-display') || lowerPath.endsWith('/customer-display')) {
        window.location.replace('/#/pos/customer-display' + search);
        return;
      }

      if (lowerPath.endsWith('/pos/kitchen-display') || lowerPath.endsWith('/kitchen-display')) {
        window.location.replace('/#/pos/kitchen-display' + search);
      }
    })();
  </script>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(123, 59, 30, 0.22), transparent 20%),
        radial-gradient(circle at bottom right, rgba(200, 90, 43, 0.22), transparent 24%),
        linear-gradient(145deg, #f7efe8 0%, #fff9f4 52%, #f6ede5 100%);
    }

    .app-loading {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 1.5rem;
    }

    .app-loading-card {
      width: min(24rem, 100%);
      position: relative;
      display: grid;
      justify-items: center;
      gap: 1rem;
      padding: 1.75rem 1.5rem;
      border: 1px solid rgba(200, 90, 43, 0.26);
      border-radius: 1.5rem;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.94) 0%, rgba(255, 249, 244, 0.92) 100%);
      backdrop-filter: blur(10px);
      box-shadow:
        0 22px 48px rgba(123, 59, 30, 0.16),
        0 0 0 1px rgba(123, 59, 30, 0.04);
      text-align: center;
      overflow: hidden;
    }

    .app-loading-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(115deg, transparent 24%, rgba(255, 255, 255, 0.54) 48%, transparent 72%);
      transform: translateX(-160%);
      animation: app-loading-card-shimmer 2.2s ease-in-out infinite;
      pointer-events: none;
    }

    .app-loading-logo {
      position: relative;
      width: min(14rem, 100%);
      height: auto;
      object-fit: contain;
      animation: app-loading-logo-pulse 1.9s ease-in-out infinite;
    }

    .app-loading-copy strong {
      display: block;
      color: #7b3b1e;
      font-size: 1.35rem;
      line-height: 1.15;
    }

    .app-loading-copy span {
      display: block;
      margin-top: 0.4rem;
      color: rgba(123, 59, 30, 0.76);
      font-size: 0.95rem;
      line-height: 1.4;
    }

    .app-loading-bar {
      width: 100%;
      height: 0.42rem;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(200, 90, 43, 0.18);
    }

    .app-loading-bar::after {
      content: "";
      display: block;
      width: 40%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #7b3b1e 0%, #c85a2b 100%);
      animation: app-loading-slide 1.15s ease-in-out infinite;
    }

    .app-loading-bar::before {
      content: "";
      position: absolute;
      inset: 0;
      width: 26%;
      background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.7) 50%, transparent 100%);
      transform: translateX(-180%);
      animation: app-loading-glint 1.15s ease-in-out infinite;
    }

    @keyframes app-loading-slide {
      0% { transform: translateX(-120%); }
      100% { transform: translateX(280%); }
    }

    @keyframes app-loading-glint {
      0% { transform: translateX(-180%); }
      100% { transform: translateX(360%); }
    }

    @keyframes app-loading-logo-pulse {
      0%, 100% { transform: scale(0.985); opacity: 0.9; }
      50% { transform: scale(1.02); opacity: 1; }
    }

    @keyframes app-loading-card-shimmer {
      0% { transform: translateX(-160%); }
      100% { transform: translateX(160%); }
    }
  </style>
</head>
<body>
  <app-root>
    <section class="app-loading" aria-label="Application loading">
      <div class="app-loading-card">
        <img class="app-loading-logo" src="cspl-logo.webp" alt="Catering Solutions logo">
        <div class="app-loading-copy">
          <strong>Unity work POS</strong>
          <span>Preparing your restaurant workspace.</span>
        </div>
        <div class="app-loading-bar" aria-hidden="true"></div>
      </div>
    </section>
  </app-root>
</body>
</html>
